<!-- Template Variables

title: The title of the article
preferred_link: The best link to associate with the article for linking out.
external_link_label: A localized label for the external link.
external_link_stripped: The external link minus the scheme.
external_link: The external link of the article if there is one provided by the author.
feed_link_title: The name of the feed associated with this article.
feed_link: The URL of the feed associated with this article.
byline: HTML that combines all the authors and links to them if available.
avatar_src: The image source URL for the feed icon / avatar.
dateline_style: Either "articleDateline" or "articleDatelineTitle".
datetime_medium: Medium length version of publish date and time.
text_size_class: The size class selected in Preferences for article text.
body: The body of the article.
-->

<header class="headerContainer">
  <div class="headerInner">
    <div class="brandBlock leftAlign">
      <!-- brandBadge removed -->
      <a class="feedlink" href="[[feed_link]]">[[feed_link_title]]</a>
    </div>
    <div class="rightAlign avatar">
      <img id="nnwImageIcon" src="[[avatar_src]]" width="40" height="40" />
    </div>
  </div>
</header>

<article>
  <div class="articleTitle">
    <h1><a href="[[preferred_link]]">[[title]]</a></h1>
  </div>
  <div class="[[dateline_style]]">
    <a href="[[preferred_link]]">[[datetime_medium]]</a>
  </div>
  <div class="externalLink">
    [[external_link_label]]
    <a href="[[external_link]]">[[external_link_stripped]]</a>
  </div>
  <div id="bodyContainer" class="articleBody [[text_size_class]]">[[body]]</div>
</article>

<script type="text/javascript">
  (function () {
    var feedLink = document.querySelector(".feedlink");
    var titleLink = document.querySelector(".articleTitle a");
    if (!feedLink) {
      return;
    }

    var text = (feedLink.textContent || "").trim();
    if (text.indexOf("Instagram: ") === 0) {
      text = text.substring("Instagram: ".length).trim();
      feedLink.textContent = text;
    }

    if (!titleLink) {
      return;
    }

    var handle = text.replace(/^@/, "").trim();
    var titleText = (titleLink.textContent || "").trim();
    var expectedPrefix = handle ? handle + ": " : "";

    if (expectedPrefix && titleText.indexOf(expectedPrefix) === 0) {
      titleLink.textContent = titleText.substring(expectedPrefix.length).trim();
    }
  })();
</script>
